version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: data_treasure_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: data_treasure
      POSTGRES_USER: data_treasure
      POSTGRES_PASSWORD: data_treasure_password
    ports:
      - "5432:5432"
    volumes:
      - data_treasure_pgdata:/var/lib/postgresql/data

volumes:
  data_treasure_pgdata:
